name: CI

# temporarily manual-only; restore `pull_request:` to re-enable per-PR runs
on:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # ponytail: NEXT_PUBLIC_* values ship in the client bundle anyway, so
      # hardcoding beats repo-variable indirection.
      NEXT_PUBLIC_SANITY_PROJECT_ID: bqxdkd49
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
