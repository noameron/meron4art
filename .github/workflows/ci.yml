name: CI

# temporarily manual-only so PRs merge without waiting on CI;
# restore `pull_request:` to re-enable per-PR runs
on:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # ponytail: NEXT_PUBLIC_* values ship in the client bundle anyway, so
      # hardcoding beats repo-variable indirection.
      NEXT_PUBLIC_SANITY_PROJECT_ID: bqxdkd49
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Unit tests (vitest)
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (playwright)
        run: npm run test:e2e

      - name: Upload e2e failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
